input_dir: data/scans
output_dir: outputs
recursive: false
scan_paths: null
quiet: false

fastsurfer:
  home: ${oc.env:FASTSURFER_HOME,external/fastsurfer}
  executable: null
  install_if_missing: true
  install_requirements: true
  requirements_file: requirements.txt
  repo_url: https://github.com/Deep-MI/FastSurfer.git
  branch: stable
  python: auto
  allow_root: true
  device: null
  viewagg_device: null
  extra_args:
    - --no_cereb
    - --no_hypothal

report:
  filename_prefix: brain_volumes

qc:
  save_example: true
  segmentation_name: example_segmentation.mgz
  color_image_name: example_qc_color.png
  slices: 12

hydra:
  job:
    chdir: false
  run:
    dir: .
